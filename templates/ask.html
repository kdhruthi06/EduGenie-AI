{% extends "base.html" %}

{% block content %}

<h1>Ask AI</h1>

<form action="/ask" method="post">

    <textarea
        name="question"
        rows="6"
        style="width:100%; padding:10px;"
        placeholder="Ask your question here..."
        required></textarea>

    <br><br>

    <button type="submit">Generate</button>

</form>

{% if response %}

<hr>

<h2>AI Response</h2>

<p>{{ response }}</p>

{% endif %}

{% endblock %}
